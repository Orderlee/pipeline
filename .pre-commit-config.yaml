# Phase 5-A (#6) — pre-commit hook 표준 가드레일.
#
# 설치:
#   pip install pre-commit
#   pre-commit install
#
# 한 번 실행 (모든 파일):
#   pre-commit run --all-files
#
# 정책:
#   - ruff (lint + format) — pyproject.toml [tool.ruff] (line-length=120) 의 룰 사용.
#     단 pyproject.toml 자체는 .gitignore 되어 있어 dev 환경에서 미리 갖춰져 있어야 함.
#   - 기본 hygiene hooks (trailing whitespace, EOF, YAML/TOML 파싱 등).
#   - pyright 는 도입 비용 (false-positive 폭주) 이 커서 후속 PR 에서 점진 도입.

repos:
  # 기본 위생
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        # tests/integration/conftest.py 등 사용자가 직접 편집할 가능성 낮은 파일도 안전.
        exclude: ^(.*\.md|docs/)
      - id: end-of-file-fixer
        exclude: ^(.*\.md|docs/)
      - id: check-yaml
        args: [--unsafe]  # multi-doc + custom tags 안전망
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=2048]

  # Ruff — lint + format.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      # Lint (auto-fix off — 개발자가 명시적으로 ruff check --fix 호출).
      - id: ruff
        args: [--exit-non-zero-on-fix]
      # Format (ruff format == black 호환).
      - id: ruff-format
