name: Deploy to Production

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "tests/**"
      - ".cursor/**"
      - ".agent/**"
      - ".github/copilot-instructions.md"
      - ".github/workflows/claude*.yml"
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "테스트 건너뛰기"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  DEPLOY_ROOT: /home/pia/work_p/Datapipeline-Data-data_pipeline/docker
  COMPOSE_PROJECT_NAME: pipeline-prod
  IMAGE_NAME: datapipeline:gpu-cu124
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    # self-hosted runner 가 등록된 Orderlee 레포에서만 실행.
    # TeamPIA(upstream)에는 runner 없음 → 워크플로우 파일이 공유되어도 여기서는 skip.
    runs-on: [self-hosted, linux, deploy, production]
    if: ${{ github.repository == 'Orderlee/Datapipeline-Data-data_pipeline' && github.event.inputs.skip_tests != 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run unit tests
        run: |
          pip install -e ".[dev]" --quiet 2>/dev/null || true
          python -m pytest tests/unit -q --tb=short 2>&1 || {
            echo "::error::Unit tests failed — 배포를 중단합니다"
            exit 1
          }

  detect_image_rebuild:
    runs-on: [self-hosted, linux, deploy, production]
    if: ${{ github.repository == 'Orderlee/Datapipeline-Data-data_pipeline' }}
    outputs:
      build_required: ${{ steps.detect.outputs.build_required }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Docker rebuild need
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "build_required=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          before="${{ github.event.before }}"
          if [[ -z "${before}" || "${before}" == "0000000000000000000000000000000000000000" ]]; then
            echo "build_required=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          build_required=false
          while IFS= read -r path; do
            [[ -z "${path}" ]] && continue
            if [[ "${path}" =~ ^docker/Dockerfile$ ]] \
              || [[ "${path}" =~ ^docker/app/ ]] \
              || [[ "${path}" =~ ^configs/ ]] \
              || [[ "${path}" =~ ^scripts/ ]] \
              || [[ "${path}" =~ ^gcp/ ]] \
              || [[ "${path}" =~ ^split_dataset/ ]] \
              || [[ "${path}" =~ ^src/python/ ]] \
              || [[ "${path}" == ".github/workflows/deploy-production.yml" ]] \
              || [[ "${path}" == ".github/workflows/deploy-test.yml" ]]; then
              build_required=true
              break
            fi
          done < <(git diff --name-only "${before}" "${{ github.sha }}")

          echo "build_required=${build_required}" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: [self-hosted, linux, deploy, production]
    timeout-minutes: 60
    needs: [test, detect_image_rebuild]
    if: |
      always() &&
      github.repository == 'Orderlee/Datapipeline-Data-data_pipeline' &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      needs.detect_image_rebuild.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Tag image with git SHA
        run: echo "IMAGE_TAG=datapipeline:${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Deploy production stack
        id: deploy
        env:
          WORKSPACE_ROOT: ${{ github.workspace }}
          DEPLOY_ROOT: ${{ env.DEPLOY_ROOT }}
          ENV_TARGET_NAME: .env
          ENV_SOURCE: /home/pia/work_p/Datapipeline-Data-data_pipeline/docker/.env
          HEALTHCHECK_URL: http://127.0.0.1:3030/server_info
          DEPLOY_LABEL: production
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          BUILD_REQUIRED: ${{ needs.detect_image_rebuild.outputs.build_required }}
          COMPOSE_PROJECT_NAME: ${{ env.COMPOSE_PROJECT_NAME }}
          REQUIRED_ENV_KEYS: DATAOPS_DUCKDB_PATH MINIO_ENDPOINT
        run: bash scripts/deploy/deploy-stack.sh

      - name: Deploy summary
        run: |
          echo "### Production deploy complete" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${GITHUB_SHA::8}" >> $GITHUB_STEP_SUMMARY
          echo "- Build required: ${{ needs.detect_image_rebuild.outputs.build_required }}" >> $GITHUB_STEP_SUMMARY
          echo "- Health: http://172.168.42.6:3030/server_info" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date '+%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_STEP_SUMMARY

      - name: Setup Claude Code CLI
        if: always() && steps.deploy.outcome == 'success'
        continue-on-error: true
        run: |
          # 이미 설치되어 있으면 skip
          if command -v claude >/dev/null 2>&1; then
            echo "claude CLI already installed: $(claude --version 2>/dev/null || echo unknown)"
            exit 0
          fi

          # npm 확인 — 없으면 설치 불가 (runner 프로비저닝에서 해결해야 함)
          if ! command -v npm >/dev/null 2>&1; then
            echo "::warning::npm not found on runner. Skipping claude CLI install."
            exit 0
          fi

          # user prefix에 설치 (sudo 불필요)
          mkdir -p "${HOME}/.npm-global"
          npm config set prefix "${HOME}/.npm-global"
          npm install -g @anthropic-ai/claude-code 2>&1 || {
            echo "::warning::claude CLI install failed. AI analysis will be skipped."
            exit 0
          }
          echo "${HOME}/.npm-global/bin" >> "$GITHUB_PATH"

      - name: AI Deploy Analysis
        if: always() && steps.deploy.outcome == 'success'
        continue-on-error: true
        timeout-minutes: 5
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          # claude CLI가 없으면 graceful skip
          if ! command -v claude >/dev/null 2>&1; then
            echo "### AI Deploy Analysis" >> $GITHUB_STEP_SUMMARY
            echo "Skipped: claude CLI not available on runner." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          BEFORE="${{ github.event.before }}"
          if [[ -z "${BEFORE}" || "${BEFORE}" == "0000000000000000000000000000000000000000" ]]; then
            BEFORE="HEAD~1"
          fi

          DIFF_SUMMARY=$(git diff --stat "${BEFORE}" "${{ github.sha }}" 2>/dev/null || echo "diff unavailable")
          COMMIT_LOG=$(git log --oneline "${BEFORE}".."${{ github.sha }}" 2>/dev/null || echo "log unavailable")

          ANALYSIS=$(claude -p \
            --max-turns 3 \
            --allowedTools "Read,Grep,Glob" \
            "Production deployment analysis for Dagster VLM pipeline.

            Commits: ${COMMIT_LOG}
            Changes: ${DIFF_SUMMARY}

            Provide: 1) Risk level (high/medium/low) 2) DuckDB impact 3) Dagster definition impact 4) Docker/infra impact 5) Recommended verification steps.
            Be concise." 2>/dev/null) || ANALYSIS="Claude analysis unavailable"

          echo "### AI Deploy Analysis" >> $GITHUB_STEP_SUMMARY
          echo "${ANALYSIS}" >> $GITHUB_STEP_SUMMARY
