name: Lint

# Phase 5-A (#6) — ruff CI gate. ubuntu-latest 사용 (self-hosted runner 미의존)
# → fork (upstream-org) 환경에서도 동작. 의존성 가벼움.
#
# 실패 시 PR 머지 차단 (branch protection 룰 별도 필요).

on:
  push:
    branches: [dev, main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".cursor/**"
      - ".agent/**"
  pull_request:
    branches: [dev, main]
    paths-ignore:
      - "docs/**"
      - "*.md"

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install --quiet "ruff>=0.7,<0.8"

      - name: ruff check
        # pyproject.toml 이 git-ignored 인 환경 대응 — 명시적으로 src/ + tests/ 만 검사.
        # line-length 등 룰은 ruff 기본값 + 본 워크플로 인자로 한정.
        run: |
          ruff check src/ tests/ --line-length 120 --target-version py310

      - name: ruff format --check
        # Phase 5-B (#130) 으로 baseline 98 files 정리 완료 → enforce 활성화.
        # 신규 PR 마다 형식 자동 강제. 위반 시 ``ruff format <file>`` 로 로컬 수정 또는
        # pre-commit hook 사용.
        run: |
          ruff format --check src/ tests/ --line-length 120

  pyright:
    # Phase 5-D — pyright basic mode 점진 도입. non-blocking 으로 시작 (continue-on-error)
    # 하여 baseline 모니터링. 진짜 null-deref (reportOptional*=error) 만 실패 처리하되
    # 전체 step 의 continue-on-error 정책에 따라 일단 PR 자체는 통과.
    # Mixin/import FP 대량 발생 — pyrightconfig.json 의 reportMissingImports=none,
    # reportAttributeAccessIssue=warning 으로 noise 제거.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run pyright (basic mode, src/vlm_pipeline only)
        # outputjson 으로 summary 캡처 → step summary 에 게시.
        run: |
          set -e
          npx --yes pyright@1.1.394 --outputjson > pyright-report.json || true
          python3 - <<'PY'
          import json
          d = json.load(open('pyright-report.json'))
          s = d.get('summary', {})
          err = s.get('errorCount', 0)
          warn = s.get('warningCount', 0)
          files = s.get('filesAnalyzed', 0)
          print(f"pyright: files={files} errors={err} warnings={warn}")
          # GITHUB_STEP_SUMMARY 게시
          import os
          summary_path = os.environ.get('GITHUB_STEP_SUMMARY')
          if summary_path:
              with open(summary_path, 'a') as f:
                  f.write(f"### pyright basic (src/vlm_pipeline)\n")
                  f.write(f"- files analyzed: {files}\n")
                  f.write(f"- errors: {err}\n")
                  f.write(f"- warnings: {warn}\n")
          # PR-B 이후 baseline = 0. Optional null-deref 4건 모두 가드 추가됨.
          # 새 error 발생 시 즉시 catch. step continue-on-error 라 PR 머지엔 영향 없지만
          # CI 빨강 alert. 향후 운영 안정화 후 continue-on-error 제거 → 진짜 blocking 게이트.
          BASELINE = 0
          if err > BASELINE:
              raise SystemExit(f"pyright errors regressed: {err} > baseline {BASELINE}")
          PY
