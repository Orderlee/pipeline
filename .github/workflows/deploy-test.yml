name: Deploy to Test

on:
  push:
    branches: [dev]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "tests/**"
      - ".cursor/**"
      - ".agent/**"
      - ".github/copilot-instructions.md"
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "테스트 건너뛰기"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: test-deploy
  cancel-in-progress: false

env:
  DEPLOY_ROOT: /home/pia/work_p/Datapipeline-Data-data_pipeline_test/docker
  COMPOSE_PROJECT_NAME: pipeline-test
  IMAGE_NAME: datapipeline:gpu-cu124
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: [self-hosted, linux, deploy, test]
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run unit tests
        run: |
          pip install -e ".[dev]" --quiet 2>/dev/null || true
          python -m pytest tests/unit -q --tb=short 2>&1 || {
            echo "::error::Unit tests failed — test 배포를 중단합니다"
            exit 1
          }

  detect_image_rebuild:
    runs-on: [self-hosted, linux, deploy, test]
    outputs:
      build_required: ${{ steps.detect.outputs.build_required }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Docker rebuild need
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "build_required=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          before="${{ github.event.before }}"
          if [[ -z "${before}" || "${before}" == "0000000000000000000000000000000000000000" ]]; then
            echo "build_required=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          build_required=false
          while IFS= read -r path; do
            [[ -z "${path}" ]] && continue
            if [[ "${path}" =~ ^docker/Dockerfile$ ]] \
              || [[ "${path}" =~ ^docker/app/ ]] \
              || [[ "${path}" =~ ^configs/ ]] \
              || [[ "${path}" =~ ^scripts/ ]] \
              || [[ "${path}" =~ ^gcp/ ]] \
              || [[ "${path}" =~ ^split_dataset/ ]] \
              || [[ "${path}" =~ ^src/python/ ]] \
              || [[ "${path}" == ".github/workflows/deploy-production.yml" ]] \
              || [[ "${path}" == ".github/workflows/deploy-test.yml" ]]; then
              build_required=true
              break
            fi
          done < <(git diff --name-only "${before}" "${{ github.sha }}")

          echo "build_required=${build_required}" >> "$GITHUB_OUTPUT"

  deploy:
    runs-on: [self-hosted, linux, deploy, test]
    timeout-minutes: 60
    needs: [test, detect_image_rebuild]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Tag image with git SHA
        run: echo "IMAGE_TAG=datapipeline:${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Deploy test stack
        env:
          WORKSPACE_ROOT: ${{ github.workspace }}
          DEPLOY_ROOT: ${{ env.DEPLOY_ROOT }}
          ENV_TARGET_NAME: .env.test
          ENV_SOURCE: /home/pia/work_p/Datapipeline-Data-data_pipeline_test/docker/.env.test
          ENV_TEMPLATE_SOURCE: ${{ github.workspace }}/docker/.env.test
          HEALTHCHECK_URL: http://127.0.0.1:3031/server_info
          DEPLOY_LABEL: test
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          BUILD_REQUIRED: ${{ needs.detect_image_rebuild.outputs.build_required }}
          COMPOSE_PROJECT_NAME: ${{ env.COMPOSE_PROJECT_NAME }}
          REQUIRED_ENV_KEYS: DATAOPS_DUCKDB_PATH MINIO_ENDPOINT
        run: bash scripts/deploy/deploy-stack.sh

      - name: Deploy summary
        run: |
          echo "### Test deploy complete" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${GITHUB_SHA::8}" >> $GITHUB_STEP_SUMMARY
          echo "- Build required: ${{ needs.detect_image_rebuild.outputs.build_required }}" >> $GITHUB_STEP_SUMMARY
          echo "- Health: http://172.168.42.6:3031/server_info" >> $GITHUB_STEP_SUMMARY
          echo "- Time: $(date '+%Y-%m-%d %H:%M:%S %Z')" >> $GITHUB_STEP_SUMMARY
