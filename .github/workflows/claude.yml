name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  claude:
    if: |
      contains(github.event.comment.body, '@claude') &&
      !github.event.comment.performed_via_github_app
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # claude-review.yml 동일 — npm 사전 설치 + path 명시 + continue-on-error.
      - name: Pre-install Claude Code CLI
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/.npm-global"
          npm config set prefix "${HOME}/.npm-global"
          npm install -g @anthropic-ai/claude-code@latest
          echo "${HOME}/.npm-global/bin" >> "$GITHUB_PATH"
          /home/runner/.npm-global/bin/claude --version || true

      - uses: anthropics/claude-code-action@v1
        continue-on-error: true
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          path_to_claude_code_executable: /home/runner/.npm-global/bin/claude
          claude_args: "--max-turns 15"
