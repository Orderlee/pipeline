                - heading "FAQ" [level=2] [ref=e1021]
                - paragraph [ref=e1022]:
                  - strong [ref=e1023]: 1、 Video Duration Support
                - list [ref=e1024]:
                  - listitem [ref=e1025]:
                    - strong [ref=e1026]: Text-to-video and image-to-video (NOT including first/last frame)
                    - text: ": Optional duration of 3~10s."
                  - listitem [ref=e1027]:
                    - strong [ref=e1028]: When video input is provided (video_list is not empty) and video editing functionality (type = base) is used
                    - text: ": Duration cannot be specified and will align with the input video."
                  - listitem [ref=e1029]:
                    - strong [ref=e1030]: Other cases (when no video is provided but an image + subject is used for video generation, or when a video is provided with video type = feature)
                    - text: ": Optional duration of 3-10s."
                - paragraph [ref=e1031]:
                  - strong [ref=e1032]: 2、 How to Extend a Video?
                - list [ref=e1033]:
                  - listitem [ref=e1034]: This can be achieved via “video reference”.
                  - listitem [ref=e1035]: By inputting a video and using a prompt to direct the model to “generate the next shot” or “generate the previous shot”.
