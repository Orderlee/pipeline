run_storage:
  module: dagster._core.storage.runs
  class: SqliteRunStorage
  config:
    base_dir: /app/dagster_home/storage

# PG-only since 2026-05-19 — DuckDB single-writer lock 정책은 불필요 (multi-process 가능).
# 신규 run 은 max_concurrent_runs 한도 안에서 병렬 실행된다.
run_coordinator:
  module: dagster._core.run_coordinator
  class: QueuedRunCoordinator
  config:
    max_concurrent_runs: 20

event_log_storage:
  module: dagster._core.storage.event_log
  class: SqliteEventLogStorage
  config:
    base_dir: /app/dagster_home/storage

schedule_storage:
  module: dagster._core.storage.schedules
  class: SqliteScheduleStorage
  config:
    base_dir: /app/dagster_home/storage

local_artifact_storage:
  module: dagster._core.storage.root
  class: LocalArtifactStorage
  config:
    base_dir: /app/dagster_home/storage

# Code server heartbeat — ffmpeg 등으로 daemon CPU 가 점유될 때
# default 20s 면 매 60-70s 마다 grpc 서브프로세스 재시작 (2026-05-19 appdata QA 에서 298회 관측).
# 60s 로 상향하여 grpc 회복 시간 확보.
code_servers:
  local_startup_timeout: 120
  reload_timeout: 120
