# =====================================================
# Data Pipeline Docker Compose
# Branch-based runtime: dev=test, main=production
# =====================================================

x-common-env: &common-env
  PIPELINE_RUNTIME_ENV: ${PIPELINE_RUNTIME_ENV:-production}
  MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://10.0.0.51:9000}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
  DUCKDB_PATH: ${DATAOPS_DUCKDB_PATH:-/data/pipeline.duckdb}
  DATAOPS_DUCKDB_PATH: ${DATAOPS_DUCKDB_PATH:-/data/pipeline.duckdb}
  # incoming/archive 는 단일 부모 bind mount(/nas/data) 하위 — 같은 mount point 라야
  # archive_finalize 가 폴더 fast-path(os.rename, ~1s) 를 탄다. 이전엔 /nas/incoming,
  # /nas/archive 를 각각 따로 bind 해서 컨테이너 안 별개 mount → cross-device(EXDEV) →
  # per-file 이동 fallback(1250 file 동시 3-4h). (2026-05-27 시나리오 15)
  INCOMING_DIR: ${INCOMING_DIR:-/nas/data/incoming}
  ARCHIVE_DIR: ${ARCHIVE_DIR:-/nas/data/archive}
  ARCHIVE_PENDING_DIR: ${ARCHIVE_PENDING_DIR:-/nas/data/archive_pending}
  MANIFEST_DIR: ${MANIFEST_DIR:-/nas/data/incoming/.manifests}
  DATAOPS_PIPELINE_ROOT: /nas/datasets/projects
  DATAOPS_NAS_ROOT: /nas/datasets/projects
  DATAOPS_NAS_ROOTS: ${DATAOPS_NAS_ROOTS:-/nas/datasets/projects;/nas/data/incoming}
  VIDEO_ENV_MODEL_DIR: /data/models/places365
  VIDEO_ENV_AUTO_DOWNLOAD: "false"
  YOLO_API_URL: http://yolo:8001
  # prod: 기본 http://sam3:8002 (= docker-sam3-1). staging: .env.test 에서
  # http://docker-sam3-1:8002 로 override 해 공유 컨테이너를 가리킨다.
  SAM3_API_URL: ${SAM3_API_URL:-http://sam3:8002}
  VIDEO_FFPROBE_TIMEOUT_SEC: "120"
  VIDEO_FFPROBE_RETRY_COUNT: "1"
  VIDEO_FFPROBE_RETRY_DELAY_MS: "250"
  DAGSTER_HOME: /app/dagster_home
  # ls_tasks.py / ls_webhook.py 가 공유하는 review state 파일 경로.
  # dagster 와 ls-webhook 두 컨테이너가 같은 호스트 dir(./data → /data)을 mount 하므로
  # 동일 경로로 명시해 state 분기를 막는다 (이전엔 dagster_home / /tmp 로 갈라져 있었음).
  LS_STATE_FILE: /data/ls_review_state.json
  # build_dataset asset 의 _require_ls_finalized() 토글.
  #   1 → labels/image_labels 의 review_status='finalized' 표지가 있는 dispatch 만
  #       dataset 후보로 사용. SOT 정책상 finalize 안 된 데이터가 vlm-dataset 에
  #       섞이지 않도록 운영 권장값.
  #   0 → 레거시 호환. 모든 raw_files 가 후보 (의도치 않은 미검수 데이터 포함 위험).
  # 2026-06-11: default 0 → 1 (codex audit). 운영자가 명시 0 set 시에만 레거시 모드.
  DATASET_REQUIRE_LS_FINALIZED: ${DATASET_REQUIRE_LS_FINALIZED:-1}
  PYTHONPATH: /:/src/python:/src/vlm
  DATAOPS_ASSET_PATH_PREFIX_FROM: ${DATAOPS_ASSET_PATH_PREFIX_FROM:-/home/user/mou/nas_192tb;/home/user/mou/archive;/home/user/mou/incoming}
  DATAOPS_ASSET_PATH_PREFIX_TO: /nas

x-runtime-volumes: &runtime-volumes
  - ${DAGSTER_HOME_HOST_PATH:-./app/dagster_home}:/app/dagster_home
  - ${DOCKER_DATA_HOST_PATH:-./data}:/data
  # NOTE: 호스트 src 를 마운트하지 않는다 — 이미지 빌드 시 COPY 된 /src/vlm 만 사용한다.
  # 호스트 src 를 마운트하면 (1) 호스트 git tree 가 stale 일 때 컨테이너도 stale 해지고,
  # (2) deploy 시점의 src 가 아닌 호스트 현재 상태가 즉시 반영돼 'deployed image == running code'
  # 단일 진리 보장이 깨진다. dev 코드 변경 즉시 반영이 필요하면 이미지 재빌드 (compose build) 로 해결.
  - type: bind
    source: ${DATASETS_HOST_PATH:-/home/user/mou/nas_192tb/datasets}
    target: /nas/datasets
    read_only: false
  - type: bind
    source: ${PROJECTS_HOST_PATH:-/home/user/mou/nas_192tb/datasets/projects}
    target: /nas/datasets/projects
    read_only: true
  # vlm-dataset NFS migration (B-narrow). 별도 target — nas_192tb/datasets와 분리.
  - type: bind
    source: ${VLM_DATASETS_HOST_PATH:-/home/user/mou/nas_200tb/datasets}
    target: /nas/vlm_datasets
    read_only: false
  # incoming/archive 를 각각 따로 bind 하면 컨테이너 안에서 별개 mount point 가 되어
  # incoming→archive os.rename 이 cross-device(EXDEV)로 실패 → archive_finalize 가 per-file
  # 이동 fallback(매우 느림). 공통 부모(${NAS_DATA_ROOT})를 단일 bind 로 mount 하면
  # /nas/data/incoming 과 /nas/data/archive 가 같은 mount → 폴더 fast-path(os.rename ~1s) 활성.
  #   prod    : NAS_DATA_ROOT=/home/user/mou/nas_200tb
  #   staging : NAS_DATA_ROOT=/home/user/mou/nas_200tb/staging
  - type: bind
    source: ${NAS_DATA_ROOT:-/home/user/mou/nas_200tb}
    target: /nas/data
    read_only: false
  - /home/user/test_data:/test_data
  - ./app/credentials:/app/credentials:ro
  - type: bind
    source: ${GCLOUD_CONFIG_HOST_PATH:-/home/user/.config/gcloud}
    target: /root/.config/gcloud
    read_only: false

x-runtime-dagster-env: &runtime-dagster-env
  <<: *common-env
  DATAOPS_MINIO__ENDPOINT: ${MINIO_ENDPOINT:-http://10.0.0.51:9000}
  DATAOPS_MINIO__ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
  DATAOPS_MINIO__SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
  DATAOPS_MINIO__BUCKET: raw-data
  # GenAI polling sensor (Phase 3.5+) — HTTP 경유로 docker/genai 컨테이너의 internal API 호출
  GENAI_INTERNAL_BASE: ${GENAI_INTERNAL_BASE:-http://genai:8088}
  GENAI_INTERNAL_TOKEN: ${GENAI_INTERNAL_TOKEN:-}
  GENAI_POLL_INTERVAL_SECONDS: ${GENAI_POLL_INTERVAL_SECONDS:-30}
  GENAI_POLL_BATCH: ${GENAI_POLL_BATCH:-20}
  # GPU 할당 정책 (2026-05-22 업데이트, NVENC dual-GPU):
  #   - dagster 계열 (app/dagster/daemon/code-server): 호스트 GPU 0+1 둘 다 노출.
  #     Python torch (Places365) 는 default cuda:0 = 호스트 GPU 0 사용.
  #     ffmpeg NVENC 는 worker thread index % 2 로 GPU 0/1 round-robin → NVENC unit 2개 활용.
  #   - SAM3 (별도 컨테이너): 호스트 GPU 1 의 CUDA cores 만 사용 (CUDA_VISIBLE_DEVICES=1).
  #     SAM3 inference (CUDA) ↔ dagster NVENC (별개 hardware unit) → 경합 없음.
  #   - 이전 2026-05-21: dagster CUDA_VISIBLE_DEVICES="0" 만 → NVENC unit 1개만 활용
  #     (RTX A4000 NVENC unit 은 GPU 당 1개라 GPU 0 의 NVENC 가 reencode bottleneck).
  CUDA_VISIBLE_DEVICES: "0,1"
  NVIDIA_VISIBLE_DEVICES: "0,1"

x-runtime-dagster-common: &runtime-dagster-common
  image: ${IMAGE_NAME:-datapipeline:gpu-cu124}
  user: "${DOCKER_USER:-0:0}"
  env_file:
    - ${PIPELINE_ENV_FILE:-.env}
  environment: *runtime-dagster-env
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes: *runtime-volumes
  networks:
    - default
    - pipeline-network
  gpus: all
  restart: unless-stopped

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ${IMAGE_NAME:-datapipeline:gpu-cu124}
    user: "${DOCKER_USER:-0:0}"
    command: ["sleep", "infinity"]
    ports:
      - "${APP_PORT:-0}:8000"
    env_file:
      - ${PIPELINE_ENV_FILE:-.env}
    environment:
      <<: *common-env
    volumes: *runtime-volumes
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    gpus: all
    restart: unless-stopped

  dagster:
    <<: *runtime-dagster-common
    working_dir: /app/dagster_home
    command:
      [
        "/bin/bash",
        "-c",
        "DAGSTER_HOME=/app/dagster_home dagster-webserver -h 0.0.0.0 -p 3030 -w /app/workspace.yaml",
      ]
    ports:
      - "${DAGSTER_PORT:-3030}:3030"
    depends_on:
      - dagster-code-server

  dagster-daemon:
    <<: *runtime-dagster-common
    working_dir: /app/dagster_home
    command:
      [
        "/bin/bash",
        "-c",
        "DAGSTER_HOME=/app/dagster_home dagster-daemon run -w /app/workspace.yaml",
      ]
    depends_on:
      - dagster-code-server

  dagster-code-server:
    <<: *runtime-dagster-common
    working_dir: /app
    command:
      [
        "/bin/bash",
        "-c",
        "DAGSTER_HOME=/app/dagster_home dagster api grpc -h 0.0.0.0 -p 4000 -f /app/dagster_defs.py -d /app -a defs",
      ]
  dispatch-webhook:
    profiles: ["webhook"]
    <<: *runtime-dagster-common
    working_dir: /app
    command: ["python3", "-m", "vlm_pipeline.defs.dispatch.webhook_server"]
    ports:
      - "${DISPATCH_WEBHOOK_PORT:-8090}:${DISPATCH_WEBHOOK_PORT:-8090}"
    environment:
      <<: *runtime-dagster-env
      DISPATCH_WEBHOOK_PORT: ${DISPATCH_WEBHOOK_PORT:-8090}
      DISPATCH_WEBHOOK_SECRET: ${DISPATCH_WEBHOOK_SECRET:-}
    depends_on:
      - dagster-code-server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${DISPATCH_WEBHOOK_PORT:-8090}/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio:
    image: minio/minio:latest
    ports:
      - "0.0.0.0:${MINIO_API_PORT:-9000}:9000"
      - "0.0.0.0:${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      # 2026-06-11: prometheus metrics 무인증 노출 차단 (codex audit).
      # jwt 사용 — Prometheus scraper 가 MinIO 의 IAM 으로 발급한 JWT 사용 필요.
      MINIO_PROMETHEUS_AUTH_TYPE: ${MINIO_PROMETHEUS_AUTH_TYPE:-jwt}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.3.1-ubuntu
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/minio-dashboard.json:/var/lib/grafana/dashboards/minio-dashboard.json:ro
      - ./grafana/nas-folder-tree-dashboard.json:/var/lib/grafana/dashboards/nas-folder-tree-dashboard.json:ro
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    # Default = vanilla postgres:15. staging 등 분석 가속이 필요한 환경에서는
    # POSTGRES_IMAGE=pgduckdb/pgduckdb:15-v1.1.1 로 override 하면 PG 안에서 DuckDB
    # 엔진을 사용 (CREATE EXTENSION pg_duckdb 후 read_parquet/duckdb.query 등 가능).
    # postgres_data volume 은 그대로 유지되므로 image swap 으로 데이터 손실 없음.
    image: ${POSTGRES_IMAGE:-postgres:15}
    # POSTGRES_PRELOAD_LIBS: pg_duckdb 같이 shared_preload_libraries 가 필요한
    # extension 활성화용. default 는 빈 문자열 (vanilla postgres:15 영향 0).
    # pgduckdb image 사용 시 POSTGRES_PRELOAD_LIBS=pg_duckdb 로 override.
    command: postgres -c shared_preload_libraries=${POSTGRES_PRELOAD_LIBS:-}
    ports:
      - "${POSTGRES_PORT:-0}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: ${POSTGRES_DB:-airflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-airflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # 공유 버스에도 노출: 별도 compose 프로젝트의 LS 스택(ls_sync/ls_webhook)이
    # 컨테이너명(docker-postgres-1)으로 prod PG 에 닿게 한다. dagster·SAM3 가 이미
    # 쓰는 external 네트워크라 신규 인프라 아님. (2026-06-02 LS PG cutover 누락 수정)
    networks:
      - default
      - pipeline-network

  yolo:
    build:
      context: ./yolo
      dockerfile: Dockerfile
    image: datapipeline-yolo:gpu-cu124
    user: root
    ports:
      - "${YOLO_PORT:-8001}:8001"
    environment:
      YOLO_MODEL_PATH: /data/models/yolo/yolov8l-worldv2.pt
      YOLO_DEVICE: "cuda:0"
      YOLO_IMGSZ: "640"
      YOLO_PORT: "8001"
      YOLO_MAX_BATCH: "8"
      YOLO_DEFAULT_CLASSES: ${YOLO_DEFAULT_CLASSES:-person,car,truck,bus,motorcycle,bicycle,fire,smoke,flame,cigarette,smoking,knife,gun,bat,baseball bat,sword,dagger,bag,backpack,suitcase,helmet,safety vest,hard hat,traffic cone,barricade,dog,cat}
      YOLO_IDLE_UNLOAD_SECONDS: "${YOLO_IDLE_UNLOAD_SECONDS:-600}"
      YOLO_IDLE_CHECK_INTERVAL_SECONDS: "${YOLO_IDLE_CHECK_INTERVAL_SECONDS:-60}"
      CUDA_VISIBLE_DEVICES: "1"
      NVIDIA_VISIBLE_DEVICES: "1"
    volumes:
      - ./data/models:/data/models:ro
    networks:
      - default
      - pipeline-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped

  sam3:
    # 단일 공유 컨테이너 정책: prod 프로젝트(docker)만 sam3 를 띄우고 docker-sam3-1 하나를
    # prod·staging 둘 다 공유한다 (pipeline-network 로 staging 도달). staging 은 이 profile 을
    # 활성화하지 않아 pipeline-test-sam3-1 을 만들지 않음 — host port 8002 충돌 회피.
    #   prod    : .env 에 COMPOSE_PROFILES=sam3 → 생성
    #   staging : 미설정 → 미생성, SAM3_API_URL=http://docker-sam3-1:8002 로 공유 참조
    profiles: ["sam3"]
    build:
      context: ./sam3
      dockerfile: Dockerfile
    image: datapipeline-sam3:gpu-cu128
    user: root
    # 2026-05-22: uvicorn workers=N 으로 GPU memory 더 활용 + concurrent inference throughput ↑.
    # 각 worker 가 독립 process 로 model 별도 로드 (memory N× ~3.7GB).
    # SAM3_WORKERS env 로 조절. 2026-05-27 GPU1 OOM 인시던트로 prod .env 는 2 로 설정
    # (4×3.7=14.8GB 가 GPU1 16GB 에서 jsh ComfyUI 등과 공유 시 파편화로 OOM). default 도 2 로 보수화.
    command: ["sh", "-c", "exec python -m uvicorn app:app --host 0.0.0.0 --port 8002 --workers ${SAM3_WORKERS:-2}"]
    ports:
      - "${SAM3_PORT:-8002}:8002"
    volumes:
      - ./data/models/sam3:/models:ro
    environment:
      SAM3_DEVICE: "cuda:0"
      SAM3_PORT: "8002"
      SAM3_SCORE_THRESHOLD: "0.0"
      SAM3_MAX_MASKS_PER_PROMPT: "50"
      SAM3_CHECKPOINT_PATH: "/models/sam3.1_multiplex.pt"
      SAM3_IDLE_UNLOAD_SECONDS: "${SAM3_IDLE_UNLOAD_SECONDS:-600}"
      SAM3_IDLE_CHECK_INTERVAL_SECONDS: "${SAM3_IDLE_CHECK_INTERVAL_SECONDS:-60}"
      SAM3_WORKERS: "${SAM3_WORKERS:-2}"
      # CUDA 메모리 파편화 완화 — OOM 인시던트(2026-05-27) 시 PyTorch 가 직접 제안.
      # idle-unload 후 burst 재로딩 시 단편화로 인한 OOM 가능성 ↓.
      PYTORCH_CUDA_ALLOC_CONF: "${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True}"
      HF_TOKEN: ${HF_TOKEN:-}
      CUDA_VISIBLE_DEVICES: "1"
      NVIDIA_VISIBLE_DEVICES: "1"
    networks:
      - default
      - pipeline-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s   # workers=3 모델 로드 시간 ~90s → start_period 60→120s
      retries: 3
    restart: unless-stopped

  genai:
    profiles: ["genai"]
    build:
      context: ./genai
      dockerfile: Dockerfile
    image: datapipeline-genai:0.1
    ports:
      - "${GENAI_PORT:-8088}:8088"
    env_file:
      - ${PIPELINE_ENV_FILE:-.env}
    environment:
      # ⚠️ genai 출력은 auto-bootstrap ingest 가 스캔하는 /nas/data/incoming 이 아니라
      # 격리된 sibling(/nas/data/genai_studio) 에 쓴다. 이유: genai provenance manifest
      # (source_type=genai_output / label_policy=none) 가 ingest sensor 에 아직 wired
      # 안 됐기에, /nas/data/incoming 에 쓰면 auto-bootstrap 이 일반 camera 미디어로
      # 줍어 학습셋 오염. 결과는 Studio UI 다운로드로 받는다.
      # 경로 구조: <GENAI_NAS_INCOMING>/<YYYY-MM-DD>/<batch>/outputs/<seq>.<ext>
      GENAI_NAS_INCOMING: ${GENAI_NAS_INCOMING:-/nas/data/genai_studio}
      # promote-to-labeling 경로 — dagster INCOMING_DIR 과 동일 anchor 가져온다.
      # genai 컨테이너는 여기에 (a) <INCOMING_DIR>/.dispatch/pending/<request_id>.json,
      # (b) <INCOMING_DIR>/genai_<batch_id>/<seq>.<ext> 두 가지를 쓴다.
      INCOMING_DIR: ${INCOMING_DIR:-/nas/data/incoming}
      DATAOPS_POSTGRES_DSN: ${DATAOPS_POSTGRES_DSN}
      KLING_ACCESS_KEY: ${KLING_ACCESS_KEY:-}
      KLING_SECRET_KEY: ${KLING_SECRET_KEY:-}
      KLING_MODEL_NAME: ${KLING_MODEL_NAME:-kling-v2-6}
      KLING_AVAILABLE_MODELS: ${KLING_AVAILABLE_MODELS:-}
      KLING_MODE: ${KLING_MODE:-pro}
      KLING_DURATION: ${KLING_DURATION:-5}
      # 플랜별 동시 작업(parallel) 한도 — 초과 submit 시 Kling 1303. 현재 플랜 5.
      KLING_MAX_CONCURRENT: ${KLING_MAX_CONCURRENT:-5}
      FAL_KEY: ${FAL_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_GOOGLE_APPLICATION_CREDENTIALS: ${GEMINI_GOOGLE_APPLICATION_CREDENTIALS:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GEMINI_GOOGLE_APPLICATION_CREDENTIALS:-}
      GEMINI_PROJECT: ${GEMINI_PROJECT:-your-gcp-project}
      GEMINI_LOCATION: ${GEMINI_LOCATION:-us-central1}
      VEO_MODEL_NAME: ${VEO_MODEL_NAME:-veo-3.1-generate-001}
      VEO_AVAILABLE_MODELS: ${VEO_AVAILABLE_MODELS:-}
      VEO_ASPECT_RATIO: ${VEO_ASPECT_RATIO:-16:9}
      VEO_OUTPUT_GCS_URI: ${VEO_OUTPUT_GCS_URI:-}
      GENAI_BASIC_AUTH_USER: ${GENAI_BASIC_AUTH_USER:-}
      GENAI_BASIC_AUTH_PASS: ${GENAI_BASIC_AUTH_PASS:-}
      GENAI_AUTH_DISABLED: ${GENAI_AUTH_DISABLED:-}
      GENAI_INTERNAL_TOKEN: ${GENAI_INTERNAL_TOKEN:-}
      GENAI_ENGINES_ENABLED: ${GENAI_ENGINES_ENABLED:-kling,higgsfield,nanobanana,gpt_image}
      GENAI_MAX_BYTES_PER_FILE: ${GENAI_MAX_BYTES_PER_FILE:-52428800}
      GENAI_MAX_FILES_PER_BATCH: ${GENAI_MAX_FILES_PER_BATCH:-20}
      # Phase 5 — quota / rate-limit (0 = off)
      GENAI_RATE_LIMIT_PER_MIN: ${GENAI_RATE_LIMIT_PER_MIN:-0}
      GENAI_DAILY_BATCH_LIMIT: ${GENAI_DAILY_BATCH_LIMIT:-0}
      GENAI_DAILY_BYTES_LIMIT: ${GENAI_DAILY_BYTES_LIMIT:-0}
    volumes:
      - type: bind
        source: ${NAS_DATA_ROOT:-/home/user/mou/nas_200tb}
        target: /nas/data
        read_only: false
      - ./app/credentials:/app/credentials:ro
    networks:
      - default
      - pipeline-network
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8088/healthz\").read()'"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped
    depends_on:
      - postgres

  # 2026-05-28 (#1): pg_dump + restic 일일 백업 sidecar.
  # restic repo 는 별도 NAS(10.0.0.36)에 두어 10.0.0.51 단일 장애로부터 격리.
  # profile=backup — prod .env COMPOSE_PROFILES 에 'backup' 추가 시 활성. staging 은 미활성.
  # restore drill: scripts/restic-restore.sh + docs/runbook/pg-restore-drill.md 참조.
  pg-backup:
    profiles: ["backup"]
    build:
      context: ./pg-backup
    image: datapipeline-pg-backup:latest
    container_name: ${COMPOSE_PROJECT_NAME:-docker}-pg-backup-1
    env_file:
      - ${PIPELINE_ENV_FILE:-.env}
    environment:
      # PG 접속 (compose network 내부)
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-airflow}
      PGPASSWORD: ${POSTGRES_PASSWORD:-airflow}
      PGDATABASE: ${PG_BACKUP_DATABASE:-vlm_pipeline}
      # restic
      RESTIC_REPOSITORY: /backup/restic
      # compose 는 profile 비활성 서비스도 변수 interpolation 을 수행하므로 ${...:?...} 강제는
      # staging deploy 전체를 깬다 (staging .env.test 엔 RESTIC_PASSWORD 없음, 의도된 분리).
      # → compose 단계는 soft default(empty), runtime entrypoint.sh 가 :?...로 fail-fast 검증.
      # backup profile 활성(prod)인데 password 누락 → 컨테이너 즉시 종료 + 명확한 에러.
      RESTIC_PASSWORD: ${RESTIC_PASSWORD:-}
      BACKUP_HOST_TAG: ${BACKUP_HOST_TAG:-docker-postgres-1}
      BACKUP_RETENTION_DAILY: ${BACKUP_RETENTION_DAILY:-7}
      BACKUP_RETENTION_WEEKLY: ${BACKUP_RETENTION_WEEKLY:-4}
      BACKUP_RETENTION_MONTHLY: ${BACKUP_RETENTION_MONTHLY:-3}
    volumes:
      # 10.0.0.36 NAS(CIFS) 별도 인프라 — 10.0.0.51 단일 장애와 격리
      - ${BACKUP_REPO_HOST_PATH:-/home/user/mou/nas_192tb/backup/postgres-restic}:/backup/restic
      # Phase 5-D (#7 SOPS 대안): .env 평문을 restic 으로 백업. SOPS 없이 키 분실 위험 회피.
      # 운영 host 권한 격리 (.env perm = user user only) + restic 백업 이중망.
      - ${PIPELINE_ENV_FILE:-./.env}:/backup/env/.env:ro
    networks:
      - default
      - pipeline-network
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  minio_data:
  postgres_data:
  grafana_data:

networks:
  default:
  pipeline-network:
    external: true
    name: pipeline-network
