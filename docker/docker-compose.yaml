# =====================================================
# Data Pipeline Docker Compose
# Python + DuckDB + MinIO + Dagster + GPU 지원
# =====================================================

name: pipeline

x-common-env: &common-env
  MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://172.168.47.36:9000}
  MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
  DUCKDB_PATH: ${DATAOPS_DUCKDB_PATH:-/data/pipeline.duckdb}
  DATAOPS_DUCKDB_PATH: ${DATAOPS_DUCKDB_PATH:-/data/pipeline.duckdb}
  DATAOPS_PIPELINE_ROOT: /nas/datasets/projects
  DATAOPS_NAS_ROOT: /nas/datasets/projects
  DATAOPS_NAS_ROOTS: /nas/datasets/projects;/nas/incoming
  VIDEO_ENV_MODEL_DIR: /data/models/places365
  VIDEO_ENV_AUTO_DOWNLOAD: "false"
  YOLO_API_URL: http://yolo:8001
  SAM3_API_URL: http://sam3:8002
  VIDEO_FFPROBE_TIMEOUT_SEC: "120"
  VIDEO_FFPROBE_RETRY_COUNT: "1"
  VIDEO_FFPROBE_RETRY_DELAY_MS: "250"
  DAGSTER_HOME: /app/dagster_home
  PYTHONPATH: /:/src/python:/src/vlm
  DATAOPS_ASSET_PATH_PREFIX_FROM: nas_192tb;archive;incoming
  DATAOPS_ASSET_PATH_PREFIX_TO: /nas

x-prod-volumes: &prod-volumes
  - ./app/dagster_home:/app/dagster_home
  - ./data:/data
  - type: bind
    source: ${DATASETS_HOST_PATH:-nas_192tb/datasets}
    target: /nas/datasets
    read_only: false
  - type: bind
    source: ${PROJECTS_HOST_PATH:-nas_192tb/datasets/projects}
    target: /nas/datasets/projects
    read_only: true
  - type: bind
    source: ${ARCHIVE_HOST_PATH:-archive}
    target: /nas/archive
    read_only: false
  - type: bind
    source: ${INCOMING_HOST_PATH:-incoming}
    target: /nas/incoming
    read_only: false
  - /home/pia/test_data:/test_data
  - type: bind
    source: ${GCLOUD_CONFIG_HOST_PATH:-/home/pia/.config/gcloud}
    target: /root/.config/gcloud
    read_only: false

# Staging 전용 볼륨 — 소스 코드를 별도 repo(dev 브랜치)에서 마운트
x-staging-volumes: &staging-volumes
  - ${STAGING_REPO_PATH:-/volume2/datapipeline-staging}/docker/app:/app
  - ${STAGING_REPO_PATH:-/volume2/datapipeline-staging}/docker/data:/data
  - type: bind
    source: ${DATASETS_HOST_PATH:-nas_192tb/datasets}
    target: /nas/datasets
    read_only: false
  - type: bind
    source: ${PROJECTS_HOST_PATH:-nas_192tb/datasets/projects}
    target: /nas/datasets/projects
    read_only: true
  - type: bind
    source: ${STAGING_ARCHIVE_HOST_PATH:-staging/archive}
    target: /nas/staging/archive
    read_only: false
  - type: bind
    source: ${STAGING_INCOMING_HOST_PATH:-staging/incoming}
    target: /nas/staging/incoming
    read_only: false
  - /home/pia/test_data:/test_data
  - ${STAGING_REPO_PATH:-/volume2/datapipeline-staging}/src/python:/src/python:ro
  - ${STAGING_REPO_PATH:-/volume2/datapipeline-staging}/src:/src/vlm:ro
  - ${STAGING_REPO_PATH:-/volume2/datapipeline-staging}/configs:/configs:ro
  - ${STAGING_REPO_PATH:-/volume2/datapipeline-staging}/split_dataset:/split_dataset:ro
  - ${STAGING_REPO_PATH:-/volume2/datapipeline-staging}/gcp:/gcp:ro
  - ${STAGING_REPO_PATH:-/volume2/datapipeline-staging}/scripts:/scripts:ro
  - type: bind
    source: ${GCLOUD_CONFIG_HOST_PATH:-/home/pia/.config/gcloud}
    target: /root/.config/gcloud
    read_only: false

x-prod-dagster-env: &prod-dagster-env
  <<: *common-env
  DATAOPS_MINIO__ENDPOINT: ${MINIO_ENDPOINT:-http://172.168.47.36:9000}
  DATAOPS_MINIO__ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
  DATAOPS_MINIO__SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
  DATAOPS_MINIO__BUCKET: raw-data

x-prod-dagster-common: &prod-dagster-common
  image: datapipeline:gpu-cu124
  user: root
  env_file:
    - .env
  environment: *prod-dagster-env
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes: *prod-volumes
  gpus: all
  restart: unless-stopped

services:
  # ===== 메인 앱 (GPU 지원) =====
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: datapipeline:gpu-cu124
    user: root
    command: ["sleep", "infinity"]
    ports:
      - "${APP_PORT:-0}:8000"
    env_file:
      - .env
    environment:
      <<: *common-env
    volumes: *prod-volumes
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    gpus: all
    depends_on:
      - minio
    restart: unless-stopped

  # ===== Dagster Webserver (운영) =====
  dagster:
    <<: *prod-dagster-common
    working_dir: /app/dagster_home
    command:
      [
        "/bin/bash",
        "-c",
        "DAGSTER_HOME=/app/dagster_home dagster-webserver -h 0.0.0.0 -p 3030 -w /app/workspace_prod.yaml",
      ]
    ports:
      - "${DAGSTER_PORT:-3030}:3030"
    depends_on:
      - dagster-code-server
      - postgres
      - minio

  # ===== Dagster Daemon (운영) =====
  dagster-daemon:
    <<: *prod-dagster-common
    working_dir: /app/dagster_home
    command:
      [
        "/bin/bash",
        "-c",
        "DAGSTER_HOME=/app/dagster_home dagster-daemon run -w /app/workspace_prod.yaml",
      ]
    depends_on:
      - dagster-code-server
      - postgres
      - minio

  # ===== Dagster Code Server (운영) =====
  dagster-code-server:
    <<: *prod-dagster-common
    working_dir: /app
    command:
      [
        "/bin/bash",
        "-c",
        "DAGSTER_HOME=/app/dagster_home dagster api grpc -h 0.0.0.0 -p 4000 -f /app/dagster_defs.py -d /app -a defs",
      ]
    depends_on:
      - postgres
      - minio

  # ===== Staging Dagster (dev 브랜치 검증용) =====
  # 소스 코드: /volume2/datapipeline-staging/ (dev 브랜치)
  # 운영 repo와 완전 분리 — git pull해도 운영에 영향 없음
  dagster-staging:
    profiles: ["staging"]
    image: datapipeline:gpu-cu124
    user: root
    working_dir: /app/dagster_home_staging
    command: ["/bin/bash", "-c", "DAGSTER_HOME=/app/dagster_home_staging /app/dg dev -w /app/workspace_staging.yaml -h 0.0.0.0 -p 3030"]
    ports:
      - "3031:3030"
    env_file:
      - .env.staging
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      <<: *common-env
      IS_STAGING: "true"
      ENABLE_YOLO_DETECTION: "true"
      ENABLE_MANUAL_LABEL_IMPORT: "true"
      DAGSTER_HOME: /app/dagster_home_staging
      DATAOPS_DUCKDB_PATH: /data/staging.duckdb
      DUCKDB_PATH: /data/staging.duckdb
      INCOMING_DIR: /nas/staging/incoming
      ARCHIVE_DIR: /nas/staging/archive
      MANIFEST_DIR: /nas/staging/incoming/.manifests
      MINIO_ENDPOINT: http://172.168.47.36:9002
      DATAOPS_MINIO__ENDPOINT: http://172.168.47.36:9002
      DATAOPS_MINIO__ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      DATAOPS_MINIO__SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      DATAOPS_MINIO__BUCKET: raw-data
      DATAOPS_PIPELINE_ROOT: /nas/datasets/projects
      DATAOPS_NAS_ROOT: /nas/datasets/projects
      DATAOPS_NAS_ROOTS: /nas/datasets/projects;/nas/incoming
      DATAOPS_ASSET_PATH_PREFIX_FROM: nas_192tb;staging/archive;staging/incoming
      DATAOPS_ASSET_PATH_PREFIX_TO: /nas
    volumes: *staging-volumes
    depends_on:
      - postgres
    gpus: all
    restart: unless-stopped

  # ===== MinIO (S3 호환 오브젝트 스토리지) =====
  minio:
    image: minio/minio:latest
    ports:
      - "0.0.0.0:${MINIO_API_PORT:-9000}:9000"
      - "0.0.0.0:${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ===== Grafana (Dashboard) =====
  grafana:
    image: grafana/grafana:12.3.1-ubuntu
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/minio-dashboard.json:/var/lib/grafana/dashboards/minio-dashboard.json:ro
      - ./grafana/nas-folder-tree-dashboard.json:/var/lib/grafana/dashboards/nas-folder-tree-dashboard.json:ro
    depends_on:
      - postgres
    restart: unless-stopped

  # ===== PostgreSQL (Grafana / 메타데이터 DB) =====
  postgres:
    image: postgres:15
    ports:
      - "${POSTGRES_PORT:-0}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: ${POSTGRES_DB:-airflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-airflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      default:
        aliases:
          - pipeline-postgres

  # ===== YOLO-World Detection Server (GPU 1 전용) =====
  yolo:
    build:
      context: ./yolo
      dockerfile: Dockerfile
    image: datapipeline-yolo:gpu-cu124
    user: root
    ports:
      - "${YOLO_PORT:-8001}:8001"
    environment:
      YOLO_MODEL_PATH: /data/models/yolo/yolov8l-worldv2.pt
      # host GPU 1만 노출하고, 컨테이너 내부에서는 단일 GPU를 cuda:0으로 사용
      YOLO_DEVICE: "cuda:0"
      YOLO_IMGSZ: "640"
      YOLO_PORT: "8001"
      YOLO_MAX_BATCH: "8"
      YOLO_DEFAULT_CLASSES: ${YOLO_DEFAULT_CLASSES:-person,car,truck,bus,motorcycle,bicycle,fire,smoke,flame,cigarette,smoking,knife,gun,bat,baseball bat,sword,dagger,bag,backpack,suitcase,helmet,safety vest,hard hat,traffic cone,barricade,dog,cat}
      CUDA_VISIBLE_DEVICES: "1"
      NVIDIA_VISIBLE_DEVICES: "1"
    volumes:
      - ./data/models:/data/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped

  # ===== SAM3 Shadow Compare Server (GPU 0 전용, optional profile) =====
  sam3:
    profiles: ["sam3"]
    build:
      context: ./sam3
      dockerfile: Dockerfile
    image: datapipeline-sam3:gpu-cu128
    user: root
    ports:
      - "${SAM3_PORT:-8002}:8002"
    volumes:
      - ./data/models/sam3:/models:ro
    environment:
      SAM3_DEVICE: "cuda:0"
      SAM3_PORT: "8002"
      SAM3_SCORE_THRESHOLD: "0.0"
      SAM3_MAX_MASKS_PER_PROMPT: "50"
      SAM3_CHECKPOINT_PATH: "/models/sam3.1_multiplex.pt"
      HF_TOKEN: ${HF_TOKEN:-}
      CUDA_VISIBLE_DEVICES: "0"
      NVIDIA_VISIBLE_DEVICES: "0"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped

# ===== 볼륨 정의 =====
volumes:
  minio_data:
  postgres_data:
  grafana_data:

# ===== 네트워크 정의 =====
networks:
  default:
    name: pipeline-network
