# =====================================================
# Data Pipeline Docker Compose
# Branch-based runtime: dev=test, main=production
# =====================================================

x-common-env: &common-env
  PIPELINE_RUNTIME_ENV: ${PIPELINE_RUNTIME_ENV:-production}
  MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://172.168.47.36:9000}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
  DUCKDB_PATH: ${DATAOPS_DUCKDB_PATH:-/data/pipeline.duckdb}
  DATAOPS_DUCKDB_PATH: ${DATAOPS_DUCKDB_PATH:-/data/pipeline.duckdb}
  INCOMING_DIR: ${INCOMING_DIR:-/nas/incoming}
  ARCHIVE_DIR: ${ARCHIVE_DIR:-/nas/archive}
  ARCHIVE_PENDING_DIR: ${ARCHIVE_PENDING_DIR:-/nas/archive_pending}
  MANIFEST_DIR: ${MANIFEST_DIR:-/nas/incoming/.manifests}
  DATAOPS_PIPELINE_ROOT: /nas/datasets/projects
  DATAOPS_NAS_ROOT: /nas/datasets/projects
  DATAOPS_NAS_ROOTS: /nas/datasets/projects;/nas/incoming
  VIDEO_ENV_MODEL_DIR: /data/models/places365
  VIDEO_ENV_AUTO_DOWNLOAD: "false"
  YOLO_API_URL: http://yolo:8001
  SAM3_API_URL: http://sam3:8002
  VIDEO_FFPROBE_TIMEOUT_SEC: "120"
  VIDEO_FFPROBE_RETRY_COUNT: "1"
  VIDEO_FFPROBE_RETRY_DELAY_MS: "250"
  DAGSTER_HOME: /app/dagster_home
  PYTHONPATH: /:/src/python:/src/vlm
  DATAOPS_ASSET_PATH_PREFIX_FROM: ${DATAOPS_ASSET_PATH_PREFIX_FROM:-/home/pia/mou/nas_192tb;/home/pia/mou/archive;/home/pia/mou/incoming}
  DATAOPS_ASSET_PATH_PREFIX_TO: /nas

x-runtime-volumes: &runtime-volumes
  - ${DAGSTER_HOME_HOST_PATH:-./app/dagster_home}:/app/dagster_home
  - ${DOCKER_DATA_HOST_PATH:-./data}:/data
  - ../src:/src/vlm:ro
  - type: bind
    source: ${DATASETS_HOST_PATH:-/home/pia/mou/nas_192tb/datasets}
    target: /nas/datasets
    read_only: false
  - type: bind
    source: ${PROJECTS_HOST_PATH:-/home/pia/mou/nas_192tb/datasets/projects}
    target: /nas/datasets/projects
    read_only: true
  - type: bind
    source: ${ARCHIVE_HOST_PATH:-/home/pia/mou/archive}
    target: /nas/archive
    read_only: false
  - type: bind
    source: ${INCOMING_HOST_PATH:-/home/pia/mou/incoming}
    target: /nas/incoming
    read_only: false
  - /home/pia/test_data:/test_data
  - ./app/credentials:/app/credentials:ro
  - type: bind
    source: ${GCLOUD_CONFIG_HOST_PATH:-/home/pia/.config/gcloud}
    target: /root/.config/gcloud
    read_only: false

x-runtime-dagster-env: &runtime-dagster-env
  <<: *common-env
  DATAOPS_MINIO__ENDPOINT: ${MINIO_ENDPOINT:-http://172.168.47.36:9000}
  DATAOPS_MINIO__ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
  DATAOPS_MINIO__SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
  DATAOPS_MINIO__BUCKET: raw-data

x-runtime-dagster-common: &runtime-dagster-common
  image: ${IMAGE_NAME:-datapipeline:gpu-cu124}
  user: "${DOCKER_USER:-0:0}"
  env_file:
    - ${PIPELINE_ENV_FILE:-.env}
  environment: *runtime-dagster-env
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes: *runtime-volumes
  networks:
    - default
    - pipeline-network
  gpus: all
  restart: unless-stopped

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ${IMAGE_NAME:-datapipeline:gpu-cu124}
    user: "${DOCKER_USER:-0:0}"
    command: ["sleep", "infinity"]
    ports:
      - "${APP_PORT:-0}:8000"
    env_file:
      - ${PIPELINE_ENV_FILE:-.env}
    environment:
      <<: *common-env
    volumes: *runtime-volumes
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    gpus: all
    restart: unless-stopped

  dagster:
    <<: *runtime-dagster-common
    working_dir: /app/dagster_home
    command:
      [
        "/bin/bash",
        "-c",
        "DAGSTER_HOME=/app/dagster_home dagster-webserver -h 0.0.0.0 -p 3030 -w /app/workspace.yaml",
      ]
    ports:
      - "${DAGSTER_PORT:-3030}:3030"
    depends_on:
      - dagster-code-server

  dagster-daemon:
    <<: *runtime-dagster-common
    working_dir: /app/dagster_home
    command:
      [
        "/bin/bash",
        "-c",
        "DAGSTER_HOME=/app/dagster_home dagster-daemon run -w /app/workspace.yaml",
      ]
    depends_on:
      - dagster-code-server

  dagster-code-server:
    <<: *runtime-dagster-common
    working_dir: /app
    command:
      [
        "/bin/bash",
        "-c",
        "DAGSTER_HOME=/app/dagster_home dagster api grpc -h 0.0.0.0 -p 4000 -f /app/dagster_defs.py -d /app -a defs",
      ]
  dispatch-webhook:
    profiles: ["webhook"]
    <<: *runtime-dagster-common
    working_dir: /app
    command: ["python3", "-m", "vlm_pipeline.defs.dispatch.webhook_server"]
    ports:
      - "${DISPATCH_WEBHOOK_PORT:-8090}:${DISPATCH_WEBHOOK_PORT:-8090}"
    environment:
      <<: *runtime-dagster-env
      DISPATCH_WEBHOOK_PORT: ${DISPATCH_WEBHOOK_PORT:-8090}
      DISPATCH_WEBHOOK_SECRET: ${DISPATCH_WEBHOOK_SECRET:-}
    depends_on:
      - dagster-code-server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${DISPATCH_WEBHOOK_PORT:-8090}/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio:
    image: minio/minio:latest
    ports:
      - "0.0.0.0:${MINIO_API_PORT:-9000}:9000"
      - "0.0.0.0:${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.3.1-ubuntu
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/minio-dashboard.json:/var/lib/grafana/dashboards/minio-dashboard.json:ro
      - ./grafana/nas-folder-tree-dashboard.json:/var/lib/grafana/dashboards/nas-folder-tree-dashboard.json:ro
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:15
    ports:
      - "${POSTGRES_PORT:-0}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: ${POSTGRES_DB:-airflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-airflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  yolo:
    build:
      context: ./yolo
      dockerfile: Dockerfile
    image: datapipeline-yolo:gpu-cu124
    user: root
    ports:
      - "${YOLO_PORT:-8001}:8001"
    environment:
      YOLO_MODEL_PATH: /data/models/yolo/yolov8l-worldv2.pt
      YOLO_DEVICE: "cuda:0"
      YOLO_IMGSZ: "640"
      YOLO_PORT: "8001"
      YOLO_MAX_BATCH: "8"
      YOLO_DEFAULT_CLASSES: ${YOLO_DEFAULT_CLASSES:-person,car,truck,bus,motorcycle,bicycle,fire,smoke,flame,cigarette,smoking,knife,gun,bat,baseball bat,sword,dagger,bag,backpack,suitcase,helmet,safety vest,hard hat,traffic cone,barricade,dog,cat}
      CUDA_VISIBLE_DEVICES: "1"
      NVIDIA_VISIBLE_DEVICES: "1"
    volumes:
      - ./data/models:/data/models:ro
    networks:
      - default
      - pipeline-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped

  sam3:
    build:
      context: ./sam3
      dockerfile: Dockerfile
    image: datapipeline-sam3:gpu-cu128
    user: root
    ports:
      - "${SAM3_PORT:-8002}:8002"
    volumes:
      - ./data/models/sam3:/models:ro
    environment:
      SAM3_DEVICE: "cuda:0"
      SAM3_PORT: "8002"
      SAM3_SCORE_THRESHOLD: "0.0"
      SAM3_MAX_MASKS_PER_PROMPT: "50"
      SAM3_CHECKPOINT_PATH: "/models/sam3.1_multiplex.pt"
      HF_TOKEN: ${HF_TOKEN:-}
      CUDA_VISIBLE_DEVICES: "0"
      NVIDIA_VISIBLE_DEVICES: "0"
    networks:
      - default
      - pipeline-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped

volumes:
  minio_data:
  postgres_data:
  grafana_data:

networks:
  default:
  pipeline-network:
    external: true
    name: pipeline-network
