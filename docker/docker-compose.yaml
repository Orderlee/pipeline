# =====================================================
# Data Pipeline Docker Compose
# Branch-based runtime: dev=test, main=production
# =====================================================

x-common-env: &common-env
  PIPELINE_RUNTIME_ENV: ${PIPELINE_RUNTIME_ENV:-production}
  MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://10.0.0.51:9000}
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
  DUCKDB_PATH: ${DATAOPS_DUCKDB_PATH:-/data/pipeline.duckdb}
  DATAOPS_DUCKDB_PATH: ${DATAOPS_DUCKDB_PATH:-/data/pipeline.duckdb}
  INCOMING_DIR: ${INCOMING_DIR:-/nas/incoming}
  ARCHIVE_DIR: ${ARCHIVE_DIR:-/nas/archive}
  ARCHIVE_PENDING_DIR: ${ARCHIVE_PENDING_DIR:-/nas/archive_pending}
  MANIFEST_DIR: ${MANIFEST_DIR:-/nas/incoming/.manifests}
  DATAOPS_PIPELINE_ROOT: /nas/datasets/projects
  DATAOPS_NAS_ROOT: /nas/datasets/projects
  DATAOPS_NAS_ROOTS: /nas/datasets/projects;/nas/incoming
  VIDEO_ENV_MODEL_DIR: /data/models/places365
  VIDEO_ENV_AUTO_DOWNLOAD: "false"
  YOLO_API_URL: http://yolo:8001
  SAM3_API_URL: http://sam3:8002
  VIDEO_FFPROBE_TIMEOUT_SEC: "120"
  VIDEO_FFPROBE_RETRY_COUNT: "1"
  VIDEO_FFPROBE_RETRY_DELAY_MS: "250"
  DAGSTER_HOME: /app/dagster_home
  # ls_tasks.py / ls_webhook.py 가 공유하는 review state 파일 경로.
  # dagster 와 ls-webhook 두 컨테이너가 같은 호스트 dir(./data → /data)을 mount 하므로
  # 동일 경로로 명시해 state 분기를 막는다 (이전엔 dagster_home / /tmp 로 갈라져 있었음).
  LS_STATE_FILE: /data/ls_review_state.json
  # build_dataset asset 의 _require_ls_finalized() 토글.
  #   1 → labels/image_labels 의 review_status='finalized' 표지가 있는 dispatch 만
  #       dataset 후보로 사용. SOT 정책상 finalize 안 된 데이터가 vlm-dataset 에
  #       섞이지 않도록 운영 권장값.
  #   0 → 레거시 호환. 모든 raw_files 가 후보 (의도치 않은 미검수 데이터 포함 위험).
  DATASET_REQUIRE_LS_FINALIZED: ${DATASET_REQUIRE_LS_FINALIZED:-0}
  PYTHONPATH: /:/src/python:/src/vlm
  DATAOPS_ASSET_PATH_PREFIX_FROM: ${DATAOPS_ASSET_PATH_PREFIX_FROM:-/home/user/mou/nas_192tb;/home/user/mou/archive;/home/user/mou/incoming}
  DATAOPS_ASSET_PATH_PREFIX_TO: /nas

x-runtime-volumes: &runtime-volumes
  - ${DAGSTER_HOME_HOST_PATH:-./app/dagster_home}:/app/dagster_home
  - ${DOCKER_DATA_HOST_PATH:-./data}:/data
  # NOTE: 호스트 src 를 마운트하지 않는다 — 이미지 빌드 시 COPY 된 /src/vlm 만 사용한다.
  # 호스트 src 를 마운트하면 (1) 호스트 git tree 가 stale 일 때 컨테이너도 stale 해지고,
  # (2) deploy 시점의 src 가 아닌 호스트 현재 상태가 즉시 반영돼 'deployed image == running code'
  # 단일 진리 보장이 깨진다. dev 코드 변경 즉시 반영이 필요하면 이미지 재빌드 (compose build) 로 해결.
  - type: bind
    source: ${DATASETS_HOST_PATH:-/home/user/mou/nas_192tb/datasets}
    target: /nas/datasets
    read_only: false
  - type: bind
    source: ${PROJECTS_HOST_PATH:-/home/user/mou/nas_192tb/datasets/projects}
    target: /nas/datasets/projects
    read_only: true
  - type: bind
    source: ${ARCHIVE_HOST_PATH:-/home/user/mou/archive}
    target: /nas/archive
    read_only: false
  - type: bind
    source: ${INCOMING_HOST_PATH:-/home/user/mou/incoming}
    target: /nas/incoming
    read_only: false
  - /home/user/test_data:/test_data
  - ./app/credentials:/app/credentials:ro
  - type: bind
    source: ${GCLOUD_CONFIG_HOST_PATH:-/home/user/.config/gcloud}
    target: /root/.config/gcloud
    read_only: false

x-runtime-dagster-env: &runtime-dagster-env
  <<: *common-env
  DATAOPS_MINIO__ENDPOINT: ${MINIO_ENDPOINT:-http://10.0.0.51:9000}
  DATAOPS_MINIO__ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
  DATAOPS_MINIO__SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
  DATAOPS_MINIO__BUCKET: raw-data
  # GenAI polling sensor (Phase 3.5+) — HTTP 경유로 docker/genai 컨테이너의 internal API 호출
  GENAI_INTERNAL_BASE: ${GENAI_INTERNAL_BASE:-http://genai:8088}
  GENAI_INTERNAL_TOKEN: ${GENAI_INTERNAL_TOKEN:-}
  GENAI_POLL_INTERVAL_SECONDS: ${GENAI_POLL_INTERVAL_SECONDS:-30}
  GENAI_POLL_BATCH: ${GENAI_POLL_BATCH:-20}

x-runtime-dagster-common: &runtime-dagster-common
  image: ${IMAGE_NAME:-datapipeline:gpu-cu124}
  user: "${DOCKER_USER:-0:0}"
  env_file:
    - ${PIPELINE_ENV_FILE:-.env}
  environment: *runtime-dagster-env
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes: *runtime-volumes
  networks:
    - default
    - pipeline-network
  gpus: all
  restart: unless-stopped

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ${IMAGE_NAME:-datapipeline:gpu-cu124}
    user: "${DOCKER_USER:-0:0}"
    command: ["sleep", "infinity"]
    ports:
      - "${APP_PORT:-0}:8000"
    env_file:
      - ${PIPELINE_ENV_FILE:-.env}
    environment:
      <<: *common-env
    volumes: *runtime-volumes
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    gpus: all
    restart: unless-stopped

  dagster:
    <<: *runtime-dagster-common
    working_dir: /app/dagster_home
    command:
      [
        "/bin/bash",
        "-c",
        "DAGSTER_HOME=/app/dagster_home dagster-webserver -h 0.0.0.0 -p 3030 -w /app/workspace.yaml",
      ]
    ports:
      - "${DAGSTER_PORT:-3030}:3030"
    depends_on:
      - dagster-code-server

  dagster-daemon:
    <<: *runtime-dagster-common
    working_dir: /app/dagster_home
    command:
      [
        "/bin/bash",
        "-c",
        "DAGSTER_HOME=/app/dagster_home dagster-daemon run -w /app/workspace.yaml",
      ]
    depends_on:
      - dagster-code-server

  dagster-code-server:
    <<: *runtime-dagster-common
    working_dir: /app
    command:
      [
        "/bin/bash",
        "-c",
        "DAGSTER_HOME=/app/dagster_home dagster api grpc -h 0.0.0.0 -p 4000 -f /app/dagster_defs.py -d /app -a defs",
      ]
  dispatch-webhook:
    profiles: ["webhook"]
    <<: *runtime-dagster-common
    working_dir: /app
    command: ["python3", "-m", "vlm_pipeline.defs.dispatch.webhook_server"]
    ports:
      - "${DISPATCH_WEBHOOK_PORT:-8090}:${DISPATCH_WEBHOOK_PORT:-8090}"
    environment:
      <<: *runtime-dagster-env
      DISPATCH_WEBHOOK_PORT: ${DISPATCH_WEBHOOK_PORT:-8090}
      DISPATCH_WEBHOOK_SECRET: ${DISPATCH_WEBHOOK_SECRET:-}
    depends_on:
      - dagster-code-server
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${DISPATCH_WEBHOOK_PORT:-8090}/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio:
    image: minio/minio:latest
    ports:
      - "0.0.0.0:${MINIO_API_PORT:-9000}:9000"
      - "0.0.0.0:${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.3.1-ubuntu
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/minio-dashboard.json:/var/lib/grafana/dashboards/minio-dashboard.json:ro
      - ./grafana/nas-folder-tree-dashboard.json:/var/lib/grafana/dashboards/nas-folder-tree-dashboard.json:ro
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    # Default = vanilla postgres:15. staging 등 분석 가속이 필요한 환경에서는
    # POSTGRES_IMAGE=pgduckdb/pgduckdb:15-v1.1.1 로 override 하면 PG 안에서 DuckDB
    # 엔진을 사용 (CREATE EXTENSION pg_duckdb 후 read_parquet/duckdb.query 등 가능).
    # postgres_data volume 은 그대로 유지되므로 image swap 으로 데이터 손실 없음.
    image: ${POSTGRES_IMAGE:-postgres:15}
    # POSTGRES_PRELOAD_LIBS: pg_duckdb 같이 shared_preload_libraries 가 필요한
    # extension 활성화용. default 는 빈 문자열 (vanilla postgres:15 영향 0).
    # pgduckdb image 사용 시 POSTGRES_PRELOAD_LIBS=pg_duckdb 로 override.
    command: postgres -c shared_preload_libraries=${POSTGRES_PRELOAD_LIBS:-}
    ports:
      - "${POSTGRES_PORT:-0}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-airflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRES_DB: ${POSTGRES_DB:-airflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-airflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  yolo:
    build:
      context: ./yolo
      dockerfile: Dockerfile
    image: datapipeline-yolo:gpu-cu124
    user: root
    ports:
      - "${YOLO_PORT:-8001}:8001"
    environment:
      YOLO_MODEL_PATH: /data/models/yolo/yolov8l-worldv2.pt
      YOLO_DEVICE: "cuda:0"
      YOLO_IMGSZ: "640"
      YOLO_PORT: "8001"
      YOLO_MAX_BATCH: "8"
      YOLO_DEFAULT_CLASSES: ${YOLO_DEFAULT_CLASSES:-person,car,truck,bus,motorcycle,bicycle,fire,smoke,flame,cigarette,smoking,knife,gun,bat,baseball bat,sword,dagger,bag,backpack,suitcase,helmet,safety vest,hard hat,traffic cone,barricade,dog,cat}
      CUDA_VISIBLE_DEVICES: "1"
      NVIDIA_VISIBLE_DEVICES: "1"
    volumes:
      - ./data/models:/data/models:ro
    networks:
      - default
      - pipeline-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped

  sam3:
    build:
      context: ./sam3
      dockerfile: Dockerfile
    image: datapipeline-sam3:gpu-cu128
    user: root
    ports:
      - "${SAM3_PORT:-8002}:8002"
    volumes:
      - ./data/models/sam3:/models:ro
    environment:
      SAM3_DEVICE: "cuda:0"
      SAM3_PORT: "8002"
      SAM3_SCORE_THRESHOLD: "0.0"
      SAM3_MAX_MASKS_PER_PROMPT: "50"
      SAM3_CHECKPOINT_PATH: "/models/sam3.1_multiplex.pt"
      HF_TOKEN: ${HF_TOKEN:-}
      CUDA_VISIBLE_DEVICES: "0"
      NVIDIA_VISIBLE_DEVICES: "0"
    networks:
      - default
      - pipeline-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    restart: unless-stopped

  genai:
    profiles: ["genai"]
    build:
      context: ./genai
      dockerfile: Dockerfile
    image: datapipeline-genai:0.1
    ports:
      - "${GENAI_PORT:-8088}:8088"
    env_file:
      - ${PIPELINE_ENV_FILE:-.env}
    environment:
      GENAI_NAS_INCOMING: /nas/staging/incoming
      DATAOPS_POSTGRES_DSN: ${DATAOPS_POSTGRES_DSN}
      KLING_ACCESS_KEY: ${KLING_ACCESS_KEY:-}
      KLING_SECRET_KEY: ${KLING_SECRET_KEY:-}
      KLING_MODEL_NAME: ${KLING_MODEL_NAME:-kling-video-o1}
      KLING_AVAILABLE_MODELS: ${KLING_AVAILABLE_MODELS:-}
      KLING_MODE: ${KLING_MODE:-pro}
      KLING_DURATION: ${KLING_DURATION:-5}
      FAL_KEY: ${FAL_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_GOOGLE_APPLICATION_CREDENTIALS: ${GEMINI_GOOGLE_APPLICATION_CREDENTIALS:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GEMINI_GOOGLE_APPLICATION_CREDENTIALS:-}
      GEMINI_PROJECT: ${GEMINI_PROJECT:-your-gcp-project}
      GEMINI_LOCATION: ${GEMINI_LOCATION:-us-central1}
      VEO_MODEL_NAME: ${VEO_MODEL_NAME:-veo-3.1-generate-001}
      VEO_AVAILABLE_MODELS: ${VEO_AVAILABLE_MODELS:-}
      VEO_ASPECT_RATIO: ${VEO_ASPECT_RATIO:-16:9}
      VEO_OUTPUT_GCS_URI: ${VEO_OUTPUT_GCS_URI:-}
      GENAI_BASIC_AUTH_USER: ${GENAI_BASIC_AUTH_USER:-}
      GENAI_BASIC_AUTH_PASS: ${GENAI_BASIC_AUTH_PASS:-}
      GENAI_AUTH_DISABLED: ${GENAI_AUTH_DISABLED:-}
      GENAI_INTERNAL_TOKEN: ${GENAI_INTERNAL_TOKEN:-}
      GENAI_ENGINES_ENABLED: ${GENAI_ENGINES_ENABLED:-kling,higgsfield,nanobanana,gpt_image}
      GENAI_MAX_BYTES_PER_FILE: ${GENAI_MAX_BYTES_PER_FILE:-52428800}
      GENAI_MAX_FILES_PER_BATCH: ${GENAI_MAX_FILES_PER_BATCH:-20}
      # Phase 5 — quota / rate-limit (0 = off)
      GENAI_RATE_LIMIT_PER_MIN: ${GENAI_RATE_LIMIT_PER_MIN:-0}
      GENAI_DAILY_BATCH_LIMIT: ${GENAI_DAILY_BATCH_LIMIT:-0}
      GENAI_DAILY_BYTES_LIMIT: ${GENAI_DAILY_BYTES_LIMIT:-0}
    volumes:
      - /home/user/mou/staging:/nas/staging
      - ./app/credentials:/app/credentials:ro
    networks:
      - default
      - pipeline-network
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8088/healthz\").read()'"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped
    depends_on:
      - postgres

volumes:
  minio_data:
  postgres_data:
  grafana_data:

networks:
  default:
  pipeline-network:
    external: true
    name: pipeline-network
