# =====================================================
# Label Studio + Webhook Server
# 별도 프로파일로 main compose와 독립 기동
# 사용: docker compose -f docker-compose.yaml -f docker-compose.labelstudio.yaml up -d
#
# postgres는 메인 compose의 default 네트워크(pipeline_default)에만 붙어 있으므로,
# labelstudio/ls-webhook도 default에 함께 연결해야 POSTGRE_HOST DNS가 동작한다.
# (pipeline-network만 쓰면 [Errno -3] Try again / DB 연결 실패)
# =====================================================

# name: pipeline  ← 제거됨.
# 이전에 name: pipeline 이 있으면 -f 로 메인 compose 와 합칠 때
# dagster 등 모든 서비스의 프로젝트명이 "pipeline"으로 덮어써져
# deploy 워크플로우의 프로젝트(pipeline-prod)와 포트 충돌 발생.
# 프로젝트명은 COMPOSE_PROJECT_NAME env 또는 기본값(디렉토리명)으로 결정.

services:
  # ===== Label Studio =====
  labelstudio:
    image: heartexlabs/label-studio:latest
    ports:
      - "0.0.0.0:${LS_PORT:-8080}:8080"
    environment:
      LABEL_STUDIO_HOST: ${LABEL_STUDIO_HOST:-http://localhost:${LS_PORT:-8080}}
      DJANGO_DB: default
      POSTGRE_NAME: ${POSTGRES_DB:-airflow}
      POSTGRE_USER: ${POSTGRES_USER:-airflow}
      POSTGRE_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRE_PORT: 5432
      # Compose 서비스명 (default 네트워크에서 해석됨). pipeline-postgres는 별칭이 아님.
      POSTGRE_HOST: postgres
    volumes:
      - labelstudio_data:/label-studio/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default
      - pipeline-network

  # ===== LS Webhook Server =====
  ls-webhook:
    image: datapipeline:gpu-cu124
    user: root
    ports:
      - "0.0.0.0:${LS_WEBHOOK_PORT:-8003}:8003"
    environment:
      LS_API_KEY: ${LS_API_KEY:-}
      LS_URL: http://labelstudio:8080
      WEBHOOK_HOST: ${WEBHOOK_HOST:-}
      WEBHOOK_PORT: ${LS_WEBHOOK_PORT:-8003}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      DATAOPS_DUCKDB_PATH: ${DATAOPS_DUCKDB_PATH:-/data/pipeline.duckdb}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://172.168.47.36:9000}
      LS_MINIO_ENDPOINT: ${LS_MINIO_ENDPOINT:-${MINIO_ENDPOINT:-http://172.168.47.36:9000}}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ./data:/data
    command:
      [
        "/bin/bash", "-c",
        "PYTHONPATH=/:/src/python:/src/vlm python3 /src/vlm/gemini/ls_webhook.py serve --host 0.0.0.0 --port ${LS_WEBHOOK_PORT:-8003}"
      ]
    depends_on:
      - labelstudio
    restart: unless-stopped
    networks:
      - default
      - pipeline-network

volumes:
  labelstudio_data:

networks:
  pipeline-network:
    external: true
