# =====================================================
# Label Studio + Webhook Server
# 별도 프로파일로 main compose와 독립 기동
# 사용: docker compose -f docker-compose.yaml -f docker-compose.labelstudio.yaml up -d
#
# postgres는 메인 compose의 default 네트워크(pipeline_default)에만 붙어 있으므로,
# labelstudio/ls-webhook도 default에 함께 연결해야 POSTGRE_HOST DNS가 동작한다.
# (pipeline-network만 쓰면 [Errno -3] Try again / DB 연결 실패)
# =====================================================

# name: pipeline  ← 제거됨.
# 이전에 name: pipeline 이 있으면 -f 로 메인 compose 와 합칠 때
# dagster 등 모든 서비스의 프로젝트명이 "pipeline"으로 덮어써져
# deploy 워크플로우의 프로젝트(pipeline-prod)와 포트 충돌 발생.
# 프로젝트명은 COMPOSE_PROJECT_NAME env 또는 기본값(디렉토리명)으로 결정.

services:
  # ===== Label Studio =====
  labelstudio:
    image: heartexlabs/label-studio:latest
    ports:
      - "0.0.0.0:${LS_PORT:-8080}:8080"
    environment:
      LABEL_STUDIO_HOST: ${LABEL_STUDIO_HOST:-http://localhost:${LS_PORT:-8080}}
      DJANGO_DB: default
      POSTGRE_NAME: ${POSTGRES_DB:-airflow}
      POSTGRE_USER: ${POSTGRES_USER:-airflow}
      POSTGRE_PASSWORD: ${POSTGRES_PASSWORD:-airflow}
      POSTGRE_PORT: 5432
      # ⚠️ 'postgres' 로 두면 공유 pipeline-network 에 함께 붙은 다른 compose 프로젝트의
      # postgres 서비스(docker-postgres-1, pipeline-test-postgres-1)와 alias 가 충돌해
      # DNS 가 엉뚱한 DB 로 round-robin → htx_user 없음 → 500 "Uh oh" (2026-06 incident,
      # 7b8e2b0 가 docker-postgres-1 을 pipeline-network 에 붙이면서 표면화). 실제 LS DB
      # 컨테이너명을 직접 지정 — ls-webhook 의 @docker-postgres-1 핀과 동일 패턴.
      POSTGRE_HOST: ${LS_POSTGRE_HOST:-pipeline-postgres-1}
    volumes:
      - labelstudio_data:/label-studio/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default
      - pipeline-network

  # ===== LS Webhook Server =====
  ls-webhook:
    image: datapipeline:gpu-cu124
    user: root
    ports:
      - "0.0.0.0:${LS_WEBHOOK_PORT:-8003}:8003"
    environment:
      LS_API_KEY: ${LS_API_KEY:-}
      LS_URL: http://labelstudio:8080
      WEBHOOK_HOST: ${WEBHOOK_HOST:-}
      WEBHOOK_PORT: ${LS_WEBHOOK_PORT:-8003}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      # ls_sync / ls_webhook 는 PG-only (2026-05-13 cutover). LS 스택은 별도 compose
      # 프로젝트라 `postgres` 가 고아 DB 로 풀리므로, 실제 prod PG 컨테이너명을 직접 박는다
      # (docker-postgres-1 을 공유 pipeline-network 에 연결해 둠). staging 은 .env.test 의
      # DATAOPS_POSTGRES_DSN(@pipeline-test-postgres-1/vlm_pipeline_staging)로 override.
      DATAOPS_POSTGRES_DSN: ${DATAOPS_POSTGRES_DSN:-postgresql://airflow:airflow@docker-postgres-1:5432/vlm_pipeline}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://10.0.0.51:9000}
      LS_MINIO_ENDPOINT: ${LS_MINIO_ENDPOINT:-${MINIO_ENDPOINT:-http://10.0.0.51:9000}}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      # dagster 컨테이너의 x-common-env 와 동일 경로로 통합.
      # /data 는 양쪽 공통 mount 라 같은 호스트 파일을 보게 된다.
      LS_STATE_FILE: /data/ls_review_state.json
    volumes:
      - ./data:/data
      # 호스트 src/ 를 read-only 로 마운트하여 ls_webhook.py / ls_sync.py 변경이
      # 컨테이너에 즉시 반영되도록 한다 (이미지 재빌드 없이도 동작).
      # docker-dagster 계열 컨테이너는 이미 같은 mount 를 갖고 있는데 ls-webhook
      # 만 빠져있어, 호스트 코드 변경 시 docker cp + restart 우회가 필요했던 운영
      # 마찰을 제거.
      - ../src:/src/vlm:ro
    command:
      [
        "/bin/bash", "-c",
        "PYTHONPATH=/:/src/python:/src/vlm python3 /src/vlm/gemini/ls_webhook.py serve --host 0.0.0.0 --port ${LS_WEBHOOK_PORT:-8003}"
      ]
    depends_on:
      - labelstudio
    restart: unless-stopped
    networks:
      - default
      - pipeline-network

volumes:
  labelstudio_data:

networks:
  pipeline-network:
    external: true
