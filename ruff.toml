# Ruff 설정 — CI·pre-commit·로컬이 모두 이 파일 하나를 소스로 쓰게 하여 lint 드리프트 차단.
#
# 배경: pyproject.toml 의 [tool.ruff] 에도 같은 값이 있으나 pyproject.toml 자체가
# .gitignore 되어 있어 (빌드/의존성 정의 포함) CI checkout·신규 clone 에는 없음 →
# 예전엔 CI 가 CLI 플래그로만 룰을 넘겨 로컬과 어긋났다. ruff.toml 은 tracked 이고
# pyproject.toml [tool.ruff] 보다 우선순위가 높아 (.ruff.toml > ruff.toml > pyproject)
# 어느 환경에서든 동일하게 적용된다. pyrightconfig.json 이 tracked 인 것과 같은 패턴.
#
# ruff 버전은 .pre-commit-config.yaml(rev v0.7.4) 및 lint.yml(ruff==0.7.4) 과 맞춰야
# format 출력이 일치한다. 로컬에서 bare ruff 를 다른 버전으로 돌리면 format 이 어긋나므로
# `pre-commit install` 사용 권장.

target-version = "py310"
line-length = 120
